name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, test, build and audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://stub:stub@localhost/stub' }}
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED || 'postgresql://stub:stub@localhost/stub' }}
          AUTH_COOKIE_SECRET: ${{ secrets.AUTH_COOKIE_SECRET || 'ci-stub-secret-32-chars-minimum!!' }}
          NEON_AUTH_URL: ${{ secrets.NEON_AUTH_URL || 'https://stub.neon.tech' }}
          NEON_AUTH_BASE_URL: ${{ secrets.NEON_AUTH_BASE_URL || 'https://stub.neon.tech' }}
          NEON_AUTH_COOKIE_SECRET: ${{ secrets.NEON_AUTH_COOKIE_SECRET || 'ci-stub-secret-32-chars-minimum!!' }}
          NEXT_PUBLIC_BASE_URL: https://www.cifrashub.com.br

      - name: Audit dependencies
        run: npm run audit
